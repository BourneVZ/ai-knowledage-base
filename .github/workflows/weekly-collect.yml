name: Weekly Collect

on:
  schedule:
    # 每周六北京时间 02:00 = 周五 UTC 18:00
    - cron: "0 18 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          DEEPSEEK_DEFAULT_MODEL: ${{ vars.DEEPSEEK_DEFAULT_MODEL }}
          QWEN_BASE_URL: ${{ vars.QWEN_BASE_URL }}
          QWEN_DEFAULT_MODEL: ${{ vars.QWEN_DEFAULT_MODEL }}
        run: |
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose --github-token "${{ secrets.GITHUB_TOKEN }}" 2>&1 | tee pipeline.log
          echo "logfile=pipeline.log" >> "$GITHUB_OUTPUT"

      - name: Validate articles
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Count articles
        id: count
        run: |
          DATE=$(date -u -d "+8 hours" +%Y-%m-%d)
          COUNT=$(ls knowledge/articles/${DATE}-*.json 2>/dev/null | wc -l)
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "Articles collected: ${COUNT} on ${DATE}"

      - name: Commit and push
        if: steps.count.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          git commit -m "chore: collect ${{ steps.count.outputs.count }} articles (${{ steps.count.outputs.date }})"
          git push
